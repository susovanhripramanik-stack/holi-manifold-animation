name: Render Manim Animation

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.py'
      - '.github/workflows/manim-render.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          sox \
          ffmpeg \
          texlive-latex-base \
          texlive-fonts-recommended \
          texlive-latex-extra \
          cm-super \
          dvipng
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install manim numpy
    
    - name: Render Manim animation (Low Quality - Fast)
      run: |
        manim -pql holi_animation.py HoliManifold || true
      timeout-minutes: 60
    
    - name: Check if video was created
      run: |
        if [ -f "videos/1080p60/holi_animation.mp4" ]; then
          ls -lh videos/1080p60/holi_animation.mp4
          echo "✅ Video rendered successfully!"
        else
          echo "⚠️ Video file not found, checking for partial renders..."
          find videos -type f -name "*.mp4" -o -name "*.mov" 2>/dev/null || echo "No video files found"
        fi
    
    - name: Upload video artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: holi-manifold-animation
        path: videos/
        retention-days: 30
    
    - name: Create release with video
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: render-${{ github.run_number }}
        files: videos/1080p60/holi_animation.mp4
        body: |
          🎨 Holi Manifold Animation Render #${{ github.run_number }}
          
          ✨ Rendered automatically on commit
          
          **Animation Details:**
          - 2200 colorful particles
          - Torus manifold visualization
          - Functor mapping animation
          - Happy Holi message
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '🎨 Manim animation rendering started! Check the **Actions** tab for progress. Video will be available as an artifact once complete.'
          })
